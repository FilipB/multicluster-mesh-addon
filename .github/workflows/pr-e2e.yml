name: E2E Tests (Kind)

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up dev environment
        run: make dev-env

      - name: Run e2e tests
        run: make test-e2e

      - name: Cleanup
        if: always()
        run: make clean-clusters || true
